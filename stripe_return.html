<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yologo</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Sora:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --color-bg:      #ffffff;
      --color-card:    #e3e3e3;
      --color-title:   #0e8af0;
      --color-body:    #9a9b9c;
      --color-icon:    #0e8af0;
      --radius-card:   20px;
      --shadow-card:   0 8px 40px rgba(14, 138, 240, 0.08),
                       0 2px 12px rgba(0, 0, 0, 0.06);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background-color: var(--color-bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .close-card {
      background-color: var(--color-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      animation: card-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .close-card .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background-color: rgba(14, 138, 240, 0.10);
      border-radius: 50%;
      margin-bottom: 1.75rem;
      animation: pop-in 0.5s 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .close-card .icon-wrap svg {
      width: 36px;
      height: 36px;
      stroke: var(--color-icon);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .close-card .card-title {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      font-weight: 700;
      color: var(--color-title);
      margin-bottom: 1rem;
      line-height: 1.25;
    }

    .close-card .card-message {
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      font-weight: 400;
      color: var(--color-body);
      line-height: 1.7;
      margin-bottom: 0;
    }

    .close-card .divider {
      width: 48px;
      height: 3px;
      background: var(--color-title);
      border-radius: 99px;
      margin: 1.25rem auto 1.5rem;
      opacity: 0.35;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pop-in {
      from {
        opacity: 0;
        transform: scale(0.6);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 575.98px) {
      .close-card {
        padding: 2.25rem 1.5rem;
      }
    }

    @media (min-width: 992px) {
      .close-card {
        padding: 3.5rem 3rem;
      }
    }
  </style>
</head>
<body>

  <div class="close-card">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 6 9 17l-5-5" />
      </svg>
    </div>

    <h1 class="card-title">Todo listo!</h1>

    <div class="divider" role="presentation"></div>

    <p class="card-message">
      Proceso finalizado<br />
      La operación continúa en segundo plano. Puedes cerrar esta pestaña cuando lo desees.
    </p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
